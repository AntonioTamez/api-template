services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      Persistence__ConnectionString: Host=postgres;Port=5432;Database=${DB_NAME:-template_db};Username=${DB_USER:-template};Password=${DB_PASSWORD:-template}
    ports:
      - "${API_HTTP_PORT:-8080}:8080"
    restart: unless-stopped

  postgres:
    image: postgres:16.4
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_DB: ${DB_NAME:-template_db}
      POSTGRES_USER: ${DB_USER:-template}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-template}
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-template}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pg-data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8.11
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-8081}:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin

volumes:
  pg-data:
  pgadmin-data:
