services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      Persistence__ConnectionString: Host=postgres;Port=5432;Database=${DB_NAME:-template_db};Username=${DB_USER:-template};Password=${DB_PASSWORD:-template}
    ports:
      - "${API_HTTP_PORT:-8080}:8080"
    restart: unless-stopped
    networks:
      - app-net

  postgres:
    image: postgres:16.4
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_DB: ${DB_NAME:-template_db}
      POSTGRES_USER: ${DB_USER:-template}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-template}
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-template}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - app-net

  pgadmin:
    image: dpage/pgadmin4:8.11
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-8081}:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - app-net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: postgresql://${DB_USER:-template}:${DB_PASSWORD:-template}@postgres:5432/${DB_NAME:-template_db}?sslmode=disable
    depends_on:
      - postgres
    networks:
      - app-net

  pushgateway:
    image: prom/pushgateway:v1.8.0
    ports:
      - "${PUSHGATEWAY_PORT:-9091}:9091"
    networks:
      - app-net

  prometheus:
    image: prom/prometheus:v2.52.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - api
      - postgres-exporter
      - pushgateway
    networks:
      - app-net

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - app-net

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    depends_on:
      - prometheus
    networks:
      - app-net

  loki:
    image: grafana/loki:3.0.0
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - app-net

  promtail:
    image: grafana/promtail:3.0.0
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - app-net

  k6:
    build:
      context: ./load-tests/k6
      dockerfile: Dockerfile
    environment:
      K6_TARGET_URL: ${K6_TARGET_URL:-http://api:8080/health/ready}
      K6_VUS: ${K6_VUS:-10}
      K6_DURATION: ${K6_DURATION:-30s}
    command:
      - "--out"
      - "prometheus=pushgateway=http://pushgateway:9091/metrics/job/k6"
      - "/tests/scripts/smoke.js"
    depends_on:
      - pushgateway
      - api
    networks:
      - app-net
    profiles:
      - k6

volumes:
  pg-data:
  pgadmin-data:
  prometheus-data:
  grafana-data:
  loki-data:

networks:
  app-net:
